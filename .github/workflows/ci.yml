name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        # The DSP tests only need numpy/scipy/pytest; no audio device or SDR
        # hardware is touched, so this runs on a plain CI runner.
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest

      - name: Run tests
        run: pytest tests/ -v
